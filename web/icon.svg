<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b1"/>
      <feGaussianBlur stdDeviation="28" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#a3ff00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="#000"/>
  <circle cx="256" cy="256" r="160" fill="none"
          stroke="url(#neon)" stroke-width="26"
          filter="url(#glow)"/>
</svg>
